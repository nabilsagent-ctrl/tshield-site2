<html lang="en">
<head>

    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="apple-touch-icon" href="/assets/logo.png">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="T-Shield">
    <meta property="og:url" content="https://www.t-shield.co/404.html">
    <meta property="og:title" content="Page Not Found — T-Shield">
    <meta property="og:description" content="The page you're looking for couldn't be found on T-Shield.">
    <meta property="og:image" content="https://www.t-shield.co/assets/logo.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Page Not Found — T-Shield">
    <meta name="twitter:description" content="The page you're looking for couldn't be found on T-Shield.">
    <meta name="twitter:image" content="https://www.t-shield.co/assets/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --white: #FFFFFF;
            --off-white: #F7F7F7;
            --mid-gray: #AAAAAA;
            --charcoal: #1A1A1A;
            --black: #0A0A0A;
        }

        html, body {
            height: 100%;
        }

        body {
            background: var(--charcoal);
            color: var(--white);
            font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 32px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .brand img {
            height: 40px;
            width: auto;
            display: block;
        }

        .brand-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--white);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 48px 24px;
            max-width: 640px;
            margin: 0 auto;
        }

        .code {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: clamp(96px, 20vw, 180px);
            line-height: 1;
            letter-spacing: 0.02em;
            color: var(--white);
            margin-bottom: 8px;
        }

        .rule {
            width: 56px;
            height: 2px;
            background: var(--white);
            opacity: 0.6;
            margin: 24px auto 32px;
        }

        h1 {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: clamp(24px, 4vw, 32px);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 16px;
        }

        p {
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            font-size: 17px;
            line-height: 1.6;
            color: var(--mid-gray);
            margin-bottom: 40px;
            max-width: 480px;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 14px 28px;
            border: 1px solid var(--white);
            color: var(--white);
            background: transparent;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .btn:hover,
        .btn:focus {
            background: var(--white);
            color: var(--charcoal);
        }

        .btn.subtle {
            border-color: rgba(255,255,255,0.35);
            color: var(--mid-gray);
        }

        .btn.subtle:hover,
        .btn.subtle:focus {
            background: rgba(255,255,255,0.08);
            color: var(--white);
        }

        footer {
            font-family: 'Barlow', sans-serif;
            font-weight: 300;
            font-size: 13px;
            color: var(--mid-gray);
            opacity: 0.7;
            text-align: center;
            letter-spacing: 0.04em;
        }

        @media (max-width: 520px) {
            .page { padding: 24px; }
            main { padding: 32px 16px; }
            .actions { flex-direction: column; width: 100%; max-width: 280px; }
            .btn { text-align: center; }
        }
    </style>
</head>
<body>
    <div class="page">
        <a href="/" class="brand" aria-label="T-Shield — home">
            <img src="/assets/logo.png" alt="T-Shield">
            <span class="brand-name">T-Shield</span>
        </a>

        <main>
            <div class="code" aria-hidden="true">404</div>
            <div class="rule" aria-hidden="true"></div>
            <h1>This page couldn't be found</h1>
            <p>The link may be outdated, or the page may have moved. Head back to the home page to choose your protection, or explore our surface and automotive lines.</p>
            <div class="actions">
                <a class="btn" href="/">Back to home</a>
                <a class="btn subtle" href="/surface-protection.html">Surface Protection</a>
                <a class="btn subtle" href="/tshield-automotive.html">Automotive</a>
            </div>
        </main>

        <footer>T-Shield &mdash; by Topaz</footer>
    </div>
</body>
</html>
